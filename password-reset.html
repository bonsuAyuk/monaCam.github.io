<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Recover your password on MonaCam monetization platform.">
  <title>Reset Password | MonaCam</title>
  
  <!-- Styling Sheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/auth.css">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">C</div>
        <span>Mona<span class="text-gradient">Cam</span></span>
      </a>
      
      <div class="nav-links">
        <a href="marketplace.html" class="nav-link">Marketplace</a>
        <a href="pricing.html" class="nav-link">Pricing Plans</a>
      </div>
      
      <div class="nav-actions">
        <a href="login.html" class="btn btn-ghost">Log In</a>
        <a href="register.html" class="btn btn-primary">Join as Creator</a>
      </div>
    </div>
  </nav>

  <!-- Password Reset Card Layout -->
  <main class="auth-wrapper">
    <div class="auth-card glass animate-fade-in">
      <div class="auth-header">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your email and we'll send you a password recovery link</p>
      </div>

      <!-- Verification Alert Dialog -->
      <div class="auth-alert auth-alert-error" id="auth-error-alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="auth-error-msg">Email not found. Please verify and try again.</span>
      </div>
      
      <div class="auth-alert auth-alert-success" id="auth-success-alert">
        <i class="fa-solid fa-circle-check"></i>
        <span>Password reset email sent! Check your inbox.</span>
      </div>

      <form id="reset-form">
        <div class="form-group">
          <label for="reset-email" class="form-label">Email Address</label>
          <input type="email" id="reset-email" class="form-control" placeholder="name@domain.cm" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Send Recovery Link</button>
      </form>

      <div class="auth-footer-links">
        Return to <a href="login.html">Log In</a>
      </div>
    </div>
  </main>

  <!-- Module Script Execution -->
  <script type="module">
    import { resetPassword } from "./js/auth.js";

    const resetForm = document.getElementById("reset-form");
    const errorAlert = document.getElementById("auth-error-alert");
    const successAlert = document.getElementById("auth-success-alert");
    const errorMsg = document.getElementById("auth-error-msg");

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorAlert.style.display = "none";
      successAlert.style.display = "none";

      const email = document.getElementById("reset-email").value;

      try {
        await resetPassword(email);
        successAlert.style.display = "flex";
      } catch (error) {
        errorMsg.innerText = error.message;
        errorAlert.style.display = "flex";
      }
    });
  </script>
  <script src="js/nav.js"></script>
</body>
</html>
