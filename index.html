<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Discover premium content from the best Cameroonian creators. Video Exclusives supporting Mobile Money and Orange Money payments.">
  <title>Creator Exclusives | Cameroon Monetization Platform</title>
  
  <!-- Styling Sheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages/exclusives.css">
  
  <!-- Font Awesome Icons for premium styling -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <!-- Dynamic Navigation Bar -->
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">C</div>
        <span>Mona<span class="text-gradient">Cam</span></span>
      </a>
      
      <div class="nav-links">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="pricing.html" class="nav-link">Pricing Plans</a>
        <span id="nav-dashboard-link-container"></span>
      </div>
      
      <div class="nav-actions" id="auth-nav-actions">
        <!-- Filled dynamically by JavaScript -->
      </div>
    </div>
  </nav>

  <!-- Filters & Search Section -->
  <section class="filters-section container animate-fade-in" style="margin-top: 20px;">
    <div class="filter-bar glass" style="margin-bottom: 20px;">
      <div class="search-box-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-bar" class="form-control search-input" placeholder="Search videos by title, creator, or topic...">
      </div>
      
      <div class="filter-actions">
        <select id="categories-list" class="form-control sort-select" style="min-width: 160px; margin-right: 10px;">
          <option value="all">All Content</option>
          <option value="loading" id="loading-categories-text">Loading categories...</option>
        </select>
        
        <select id="sort-filter" class="form-control sort-select">
          <option value="newest">Newest First</option>
          <option value="popular">Most Viewed</option>
          <option value="oldest">Oldest</option>
        </select>
      </div>
    </div>
  </section>

  <main class="container animate-fade-in" style="min-height: 50vh; padding-bottom: 60px;">
    <div class="video-grid" id="videos-grid">
      <!-- Cards rendered dynamically by JS -->
    </div>
    
    <!-- Empty State -->
    <div id="empty-state" class="empty-state" style="display: none; grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
      <i class="fa-solid fa-video-slash" style="font-size: 24px; margin-bottom: 16px;"></i>
      <h3>No videos found</h3>
      <p>Try adjusting your search or filters.</p>
    </div>

    <!-- Infinite Scroll Trigger -->
    <div class="infinite-scroll-trigger" id="infinite-scroll-trigger" style="grid-column: 1/-1; text-align: center; padding: 20px;">
      <div class="spinner" id="loading-spinner"></div>
    </div>

  <!-- Featured Creators Section -->
  <section class="featured-creators-section container animate-fade-in" style="margin-top: 60px; margin-bottom: 60px;">
    <h2 class="section-title">
      <i class="fa-solid fa-star text-gradient"></i> Featured Creators
    </h2>
    
    <div class="featured-carousel-container">
      <div class="featured-carousel" id="featured-creators-list">
        <!-- Rendered dynamically by JavaScript -->
        <div class="creator-card skeleton">
          <div style="width: 80px; height: 80px; border-radius:50%; background: #222; margin: 0 auto 16px;"></div>
          <div style="height: 16px; background: #222; width: 60%; margin: 0 auto 8px;"></div>
          <div style="height: 12px; background: #222; width: 40%; margin: 0 auto;"></div>
        </div>
      </div>
    </div>
  </section>
  </main>

  <!-- Footer -->
  <footer class="footer" style="padding: 24px 0; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); margin-top: auto; background: var(--bg-secondary);">
    <div class="container">
      <p style="color: var(--text-muted); font-size: 14px; margin: 0;">Copyright &copy; 2026 MonaCam. All Rights Reserved.</p>
    </div>
  </footer>

  <!-- Core Page Logic (ES Module) -->
  <script type="module" src="js/index.js"></script>
  <script src="js/nav.js"></script>
</body>
</html>
